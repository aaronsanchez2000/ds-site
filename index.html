<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Danny Styles music, merch, credits, gear, press kit, and contact."
    />
    <title>Danny Styles</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/png" href="assets/favicon64.png" />
    <script defer src="js/data-loader.js"></script>
    <script defer src="js/main.js"></script>
  </head>
  <body class="home-page">
    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="index.html" aria-label="Danny Styles home">
          <img
            class="brand-mark"
            src="assets/sushi.png"
            alt=""
            onerror="this.hidden = true"
          />
          <span class="brand-text">Danny Styles</span>
        </a>
        <button
          class="nav-toggle"
          type="button"
          aria-expanded="false"
          aria-controls="site-nav"
        >
          <span></span><span class="sr-only">Menu</span>
        </button>
        <nav class="site-nav" id="site-nav" aria-label="Main navigation">
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="music.html">Music</a></li>
            <li>
              <a
                href="https://dxnnystyles.myshopify.com/"
                target="_blank"
                rel="noopener noreferrer"
                >Merch</a
              >
            </li>
            <li><a href="gear.html">Gear</a></li>
            <li><a href="credits.html">Credits</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="hero">
        <div class="hero-panel">
          <div class="hero-copy">
            <span class="eyebrow">Official Site</span>
            <h1>Danny Styles</h1>
            <div class="actions hero-actions">
              <a class="button" href="music.html" rel="noopener noreferrer">
                <img
                  class="hero-button-icon"
                  src="assets/listen-icon.png"
                  alt=""
                  aria-hidden="true"
                />
                <span>Listen Now</span>
              </a>
              <a
                class="button-secondary"
                href="https://dxnnystyles.myshopify.com/"
                target="_blank"
                rel="noopener noreferrer"
              >
                <img
                  class="hero-button-icon"
                  src="assets/shop-icon2.webp"
                  alt=""
                  aria-hidden="true"
                />
                <span>Shop Merch</span>
              </a>
            </div>
          </div>
        </div>
      </section>

      <section class="section">
        <div class="section-heading">
          <h2>Latest Release</h2>
        </div>
        <div class="latest-panel" data-latest-release></div>
      </section>

      <section class="section">
        <div class="section-heading">
          <h2>Merch</h2>
          <a
            class="button"
            href="https://dxnnystyles.myshopify.com/"
            target="_blank"
            rel="noopener noreferrer"
            >Shop All</a
          >
        </div>
        <div class="merch-wheel" data-merch-wheel>
          <button
            class="carousel-arrow"
            type="button"
            data-merch-prev
            aria-label="Previous merch item"
          >
            <span class="carousel-arrow-symbol" aria-hidden="true">←</span>
          </button>
          <div class="merch-window">
            <div
              class="merch-track"
              data-merch-carousel
              aria-label="Featured merch carousel"
            ></div>
          </div>
          <button
            class="carousel-arrow"
            type="button"
            data-merch-next
            aria-label="Next merch item"
          >
            <span class="carousel-arrow-symbol" aria-hidden="true">→</span>
          </button>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-inner">
        <p>© Danny Styles</p>
        <div
          class="footer-links social-icons"
          aria-label="Social and streaming links"
        >
          <a
            class="social-icon"
            href="https://instagram.com/dxnnystyles"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Instagram"
            ><img src="assets/igicon.png" alt="" aria-hidden="true"
          /></a>
          <a
            class="social-icon"
            href="https://tiktok.com/@dxnnystyles"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="TikTok"
            ><img
              class="social-icon-tiktok"
              src="assets/tiktokicon2.webp"
              alt=""
              aria-hidden="true"
          /></a>
          <a
            class="social-icon"
            href="https://music.apple.com/us/artist/danny-styles/1522118514"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Apple Music"
            ><img src="assets/appleicon.png" alt="" aria-hidden="true"
          /></a>
          <a
            class="social-icon"
            href="https://open.spotify.com/artist/0Hh1myvGPs7x9RQwoANmkr"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="Spotify"
            ><img src="assets/spotifyicon.png" alt="" aria-hidden="true"
          /></a>
          <a
            class="social-icon"
            href="https://music.youtube.com/channel/UCTHdQH06sluH9XLmZ9aQPAw"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="YouTube"
            ><img src="assets/youtubeicon.png" alt="" aria-hidden="true"
          /></a>
        </div>
      </div>
    </footer>
  </body>
</html>
